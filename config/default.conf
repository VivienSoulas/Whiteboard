server {
	listen localhost:8080;
	server_name localhost;
	ssl_certificate ./cert.pem;
	ssl_certificate_key ./key.pem;
	ssl_port 8082;
		
	max_body_size 5m;
		
	error_page 404 /404.html;
	error_page 500 502 503 504 /50x.html;
		
	root ./assets/www;
		
	location / {
		methods GET POST HEAD;
		index index.html;
		directory_listing off;
	}
		
	location /files {
		methods GET HEAD;
		directory_listing on;
	}
		
	location /upload {
		methods POST DELETE;
		root ./assets/uploads;
		upload_dir ./assets/uploads;
		directory_listing off;
	}
		
	location /cgi-bin {
		methods GET POST HEAD;
		cgi_extension .php;
		directory_listing on;
	}
		
	location /whiteboard {
		methods GET HEAD;
		root ./assets/whiteboard;
		index index.html;
		directory_listing off;
	}

	location /api {
		methods GET POST HEAD;
		root ./assets/www/api;
		cgi_extension .py;
		directory_listing off;
	}

	location /old {
		return 301 /;
	}
}
