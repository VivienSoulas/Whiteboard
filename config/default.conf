server {
    listen localhost:8080;
    
    server_name localhost;
    max_body_size 5m;
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    root ./assets/www;
    
    location / {
        methods GET POST HEAD;
        index index.html;
        directory_listing off;
    }
    
    location /files {
        methods GET HEAD;
        directory_listing on;
    }
    
    location /upload {
        methods POST DELETE;
        root ./assets/uploads;
        upload_dir ./assets/uploads;
        directory_listing off;
    }
    
    location /cgi-bin {
        methods GET POST HEAD;
        cgi_extension .php;
        directory_listing on;
    }
    
    location /whiteboard {
        methods GET HEAD;
        root ./assets/whiteboard;
        index index.html;
        directory_listing off;
    }

    location /old {
        return 301 /;
    }
}

server {
    listen localhost:8081;
    
    server_name example.local;
    max_body_size 10m;
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    root ./assets/example;
    
    location / {
        methods GET POST HEAD DELETE;
        index index.html;
        directory_listing off;
        upload_dir ./assets/example;
    }
    
    location /cgi-bin {
        methods GET POST HEAD;
        cgi_extension .py;
        directory_listing on;
    }
}

server {
    listen localhost:8082;
    
    server_name localhost;
    max_body_size 1G;
    
    root ./assets/YoupiBanane;
    
    location / {
        methods GET;
        index index.html;
    }
    
    location /put_test {
        methods PUT;
    }
    
    location /post_body {
        methods GET POST;
        max_body_size 100;
    }
    
    location /directory {
        methods GET POST;
        root ./assets/YoupiBanane;
        index youpi.bad_extension;
        cgi_extension .bla;
    }
}
